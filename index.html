<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>人类丰荣 Bingo v2.4</title>
  <meta name="theme-color" content="#7ea68d" />
  <style>
    :root {
      --bg: #f4f7f1; --panel: rgba(255,255,255,.82); --card: #ffffff; --text: #2d3a31;
      --muted: #77867b; --accent: #8db79a; --accent-2: #e8b97e; --checked: #98cfab;
      --free: #fff0d8; --danger: #e27d7d; --shadow: 0 10px 30px rgba(55, 84, 63, .12); --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(174, 215, 191, .35), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 219, 176, .32), transparent 28%),
        var(--bg);
      padding: max(16px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
      overflow-x: hidden;
    }
    .wrap { max-width: 860px; margin: 0 auto; }
    .hero {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.65);
      border-radius: 28px;
      padding: 18px 18px 14px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 10px;
      z-index: 20;
    }
    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(24px, 5vw, 34px); line-height: 1.1; }
    .version {
      font-size: .42em;
      font-weight: 600;
      color: var(--muted);
      margin-left: 6px;
      vertical-align: middle;
    }
    .sub { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .badge {
      background: #fff;
      border: 1px solid rgba(126,166,141,.25);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .layout {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.65);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
.notice-board {
  margin: 14px 0 0;
  background: var(--panel);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.65);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 12px 14px;
}

.notice-head {
  width: 100%;
  border: none;
  background: transparent;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  box-shadow: none;
}

.notice-body {
  padding-top: 10px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}

.notice-body p {
  margin: 6px 0;
}

.notice-arrow {
  transition: transform .2s ease;
}

.notice-board.collapsed .notice-body {
  display: none;
}

.notice-board.collapsed .notice-arrow {
  transform: rotate(-90deg);
}

    .folder-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 5px;
      scrollbar-width: none;
    }
    .folder-tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 8px 16px;
      background: #fff;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid rgba(0,0,0,0.05);
      transition: 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .tab-add {
      color: var(--accent);
      border: 1px dashed var(--accent);
    }

    .bingo-grid { display: grid; gap: 10px; }
    .item {
      min-height: 62px;
      aspect-ratio: 1 / 1;
      background: var(--card);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(9px, 2.2vw, 14px);
      line-height: 1.25;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,.06);
      padding: 8px;
      user-select: none;
      transition: transform .18s ease, box-shadow .18s ease;
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
    }
    .item.checked {
      background: linear-gradient(180deg, #b5e2c1, var(--checked));
      color: white;
      border-color: rgba(255,255,255,.45);
    }
    .item:empty::before {
      content: "空";
      opacity: 0.2;
      font-size: 12px;
    }
    .item.bingo-hit {
      animation: glow 1s ease infinite alternate;
      border-color: rgba(255,255,255,.85);
    }
    .item.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: -4px;
    }
    @keyframes glow {
      from { box-shadow: 0 0 0 rgba(255,255,255,0), 0 8px 18px rgba(0,0,0,.06); }
      to { box-shadow: 0 0 0 6px rgba(255,255,255,.2), 0 10px 22px rgba(77, 165, 110, .26); }
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: none;
      background: white;
      color: var(--text);
      padding: 11px 14px;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,.06);
      transition: transform .15s ease;
      font-size: 13px;
    }
    .primary { background: var(--accent); color: white; }
    .secondary { background: #fff8ef; }
    .danger { background: #fff2f2; color: #8a4444; }

    .size-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .size-chip {
      padding: 8px 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.06);
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,.04);
    }
    .size-chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .tag-pool-section {
      margin-top: 16px;
      border-top: 1px solid rgba(0,0,0,0.05);
      padding-top: 16px;
    }
    .tag-input-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tag-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 8px 12px;
      outline: none;
    }
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
      padding: 4px;
    }
    .tag-item {
      background: #fff;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: grab;
      transition: 0.2s;
    }
    .tag-item:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: #f0fdf4;
    }
    .tag-item.dragging { opacity: .45; }
    .tag-item .del {
      color: var(--danger);
      cursor: pointer;
      font-weight: bold;
      padding-left: 4px;
    }

    .history-card {
      background: linear-gradient(135deg, #7ea68d15, #e8b97e15);
      border: 1px dashed var(--accent);
      border-radius: 18px;
      padding: 12px;
      margin-top: 16px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 8px;
    }
    .stat-card {
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 6px 14px rgba(0,0,0,.04);
    }
    .stat-card strong {
      display: block;
      font-size: 24px;
      margin-top: 2px;
    }
    .achievement-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .achievement {
      border-radius: 16px;
      padding: 10px 12px;
      background: rgba(255,255,255,.8);
      border: 1px solid rgba(126,166,141,.18);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .achievement.locked { opacity: .52; }

    .tiny { font-size: 12px; color: var(--muted); }
    .section-title { margin: 0 0 8px 0; font-size: 16px; }
    .micro-copy {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(26,35,29,.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }
    .modal.open { display: flex; }
    .modal-card {
      width: min(720px, 100%);
      max-height: 88vh;
      background: #f9fbf8;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      overflow-y: auto;
    }
    .editor-area {
      width: 100%;
      min-height: 240px;
      border-radius: 16px;
      padding: 12px;
      border: 1px solid #ddd;
    }

    .export-form {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }
    .export-form label {
      font-size: 13px;
      color: var(--muted);
      display: grid;
      gap: 6px;
    }
    .export-input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      background: #fff;
      color: var(--text);
      font-size: 14px;
    }

    .export-preview-wrap {
      background: linear-gradient(180deg, rgba(255,255,255,.6), rgba(255,255,255,.35));
      border-radius: 22px;
      padding: 14px;
      border: 1px solid rgba(126,166,141,.15);
    }

    .export-card {
  width: 720px;
  max-width: 100%;
      background:
        radial-gradient(circle at top left, rgba(174, 215, 191, .28), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 219, 176, .24), transparent 28%),
        #f4f7f1;
      color: #2d3a31;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 18px 40px rgba(55, 84, 63, .14);
      overflow: hidden;
    }

    .export-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }
    .export-title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 800;
      margin: 0;
    }
    .export-sub {
      margin-top: 8px;
      font-size: 13px;
      color: #77867b;
    }
    .export-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 16px;
    }
    .export-pill {
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(126,166,141,.18);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,.04);
    }
    .export-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .export-cell {
      aspect-ratio: 1 / 1;
      min-height: 74px;
      border-radius: 16px;
      background: rgba(255,255,255,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      line-height: 1.28;
      box-shadow: 0 6px 14px rgba(0,0,0,.05);
      border: 2px solid transparent;
      word-break: break-word;
    }
    .export-cell.checked {
      background: linear-gradient(180deg, #b5e2c1, #98cfab);
      color: #fff;
      border-color: rgba(255,255,255,.5);
    }
    .export-cell.hit {
      box-shadow: 0 0 0 4px rgba(255,255,255,.32), 0 8px 18px rgba(77,165,110,.18);
    }
    .export-footer {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .export-copy {
      font-size: 13px;
      color: #77867b;
      line-height: 1.5;
      max-width: 60%;
    }
    .export-site {
      font-size: 12px;
      color: #77867b;
      text-align: right;
      word-break: break-all;
      max-width: 260px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: rgba(45,58,49,.94);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      opacity: 0;
      transition: .25s ease;
      z-index: 100;
      pointer-events: none;
      max-width: min(92vw, 520px);
      text-align: center;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; }
      .hero { position: static; }
      .export-title { font-size: 24px; }
      .export-card { padding: 18px; }
      .export-copy, .export-site { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>🌿 人类丰荣 Bingo <span class="version">v2.4</span></h1>
          <div class="sub">增加生活的接触面。</div>
        </div>
        <div class="badge-row">
          <div class="badge" id="todayBadge">今天：--</div>
          <div class="badge" id="progressBadge">进度：0 / 0</div>
          <div class="badge" id="lineBadge">Bingo：0 条</div>
        </div>
      </div>
    </section>
<section class="notice-board" id="noticeBoard">
  <button class="notice-head" id="noticeToggle" type="button" aria-expanded="true">
    <span>📢 系统公告</span>
    <span class="notice-arrow">▾</span>
  </button>
  <div class="notice-body" id="noticeBody">
    <p><strong>v2.4</strong></p>
    <p>修复了无法删除任务池文本的 bug。</p>
    <p><strong>Tips：</strong></p>
    <p>• 可以拖拽 tag 或 bingo 格进行编辑</p>
    <p>• iOS 用户可以通过 Safari 打开网页，点击分享键，选择添加至主屏幕，以更便捷地访问本页面，体验接近小组件或 App</p>
  </div>
</section>
    <div class="layout">
      <section class="panel">
        <div class="folder-tabs" id="folderTabs"></div>
        <div class="bingo-grid" id="bingoGrid"></div>

        <div class="controls">
          <button class="primary" onclick="randomChallenge()">🎲 随机挑战</button>
          <button class="secondary" id="editAllBtn">文本编辑</button>
          <button class="secondary" onclick="renameGroup()">重命名</button>
          <button class="secondary" id="openExportBtn">导出卡片</button>
          <button class="danger" id="resetChecksBtn">清空当前打卡</button>
          <button class="danger" onclick="deleteGroup()" style="background:#fff0f0">删除组</button>
        </div>

        <div class="size-picker" id="sizePicker"></div>

        <div class="tag-pool-section">
          <h3 style="margin:0 0 5px 0; font-size:15px; color:var(--accent)">🏷️ 任务池</h3>
          <div class="tag-input-wrap">
            <input type="text" id="tagInput" class="tag-input" placeholder="输入新任务按回车...">
            <button class="primary" onclick="addTagFromInput()">添加</button>
          </div>
          <div class="tags-container" id="tagPool"></div>
        </div>
      </section>

      <aside class="panel">
        <h2 class="section-title">📊 丰荣统计</h2>
        <div class="stat-grid">
          <div class="stat-card"><div class="tiny">今日已点亮</div><strong id="checkedCount">0</strong></div>
          <div class="stat-card"><div class="tiny">Bingo线</div><strong id="bingoCount">0</strong></div>
          <div class="stat-card"><div class="tiny">连续天数</div><strong id="streakCount">0</strong></div>
          <div class="stat-card"><div class="tiny">完美天数</div><strong id="perfectDays">0</strong></div>
        </div>

        <div class="history-card" id="historyCard">
          <h3 style="margin:0 0 8px 0; font-size:14px;">🕰️ 昨日回顾 (<span id="prevDate">--</span>)</h3>
          <div style="font-size:13px; color:var(--muted); line-height:1.6;">
            完成数：<span id="prevChecked">0</span> |
            连线数：<span id="prevLines">0</span>条
          </div>
        </div>

        <h2 class="section-title" style="margin-top:20px;">🏆 成就勋章墙</h2>
        <div class="achievement-list" id="achievementList"></div>

        <div class="micro-copy">增加生活的接触面。</div>
      </aside>
    </div>
  </div>

  <div class="modal" id="editorModal"><div class="modal-card">
      <h2 class="section-title">批量编辑 (一行一个)</h2>
      <textarea class="editor-area" id="editorArea"></textarea>
      <div class="controls">
        <button class="primary" id="saveEditorBtn">保存</button>
        <button id="closeEditorBtn">取消</button>
      </div>
  </div></div>

  <div class="modal" id="exportModal"><div class="modal-card">
      <h2 class="section-title">导出卡片</h2>

      <div class="export-form">
        <label>
          用户名
          <input type="text" id="exportUsername" class="export-input" placeholder="比如：CIEL">
        </label>
        <label>
          底部一句话
          <input type="text" id="exportNote" class="export-input" placeholder="增加生活的接触面。">
        </label>
      </div>

      <div class="export-preview-wrap">
        <div id="exportCard" class="export-card"></div>
      </div>

      <div class="controls">
        <button class="primary" id="downloadExportBtn">保存图片</button>
        <button id="closeExportBtn">取消</button>
      </div>
  </div></div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const MY_TAGS = ['学习','阅读','写作','散步','整理房间','记录','创作','吃补剂','营养均衡','写代码','洗头','听音乐','整理文献','孝家产','骗水','晒太阳','出门','看电影','打游戏','吃饭','联系朋友','拉伸','6h+睡眠','点香氛','做咖啡'];
    const FIXED_SITE_URL = 'https://cielwuuuu.github.io/Human_prosperity_bingo_ciel/';

    const ACHIEVEMENTS = [
      { id: 'a1', label: '初探丰荣', desc: '点亮第1个格子', test: s => s.totalChecksEver >= 1 },
      { id: 'a2', label: '一线生机', desc: '达成1条Bingo', test: s => s.bestBingoLines >= 1 },
      { id: 'a3', label: '三线开花', desc: '单日达成3条Bingo', test: s => s.bestBingoLines >= 3 },
      { id: 'a4', label: '稳定活着', desc: '连续3天有效打卡', test: s => s.bestStreak >= 3 },
      { id: 'a5', label: '丰荣周', desc: '连续7天有效打卡', test: s => s.bestStreak >= 7 },
      { id: 'a6', label: '完美主义', desc: '完成一次全满', test: s => s.perfectDays >= 1 },
      { id: 'a7', label: '深度定制', desc: '手动修改/填入过内容', test: s => s.hasEdited === true },
      { id: 'a8', label: '随机挑战', desc: '使用过一键挑战功能', test: s => s.hasShuffled === true },
      { id: 'a9', label: '百折不挠', desc: '累计点亮100个格子', test: s => s.totalChecksEver >= 100 },
      { id: 'a10', label: '午夜诗人', desc: '凌晨打过卡', test: s => s.midnightOwl === true },
      { id: 'a11', label: '断舍离', desc: '重置过打卡进度', test: s => s.hasReset === true },
      { id: 'a12', label: '多面人生', desc: '创建了超过2个分组', test: s => s.groupCount >= 3 },
      { id: 'a13', label: '丰荣满月', desc: '连续30天记录', test: s => s.bestStreak >= 30 },
      { id: 'a14', label: '大满贯', desc: '单日达成8条以上Bingo', test: s => s.bestBingoLines >= 8 },
      { id: 'a15', label: '这就是生活', desc: '累计点亮500次', test: s => s.totalChecksEver >= 500 }
    ];

    const SIZE_OPTIONS = [
      { key: '4x4', rows: 4, cols: 4 },
      { key: '4x5', rows: 4, cols: 5 },
      { key: '5x5', rows: 5, cols: 5 }
    ];

    let dragState = { type: null, value: null };
    let appData = loadData();

    function getTodayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getDisplayDate(key) {
      if (!key || key === '无记录') return '无记录';
      const [y, m, d] = key.split('-');
      if (!y || !m || !d) return key;
      return `${y}/${m}/${d}`;
    }

    function createGroup(name) {
      return {
        name,
        rows: 5,
        cols: 5,
        tasks: Array(25).fill(""),
        checks: Array(25).fill(false),
        randomDate: null
      };
    }

    function migrateData(data) {
      data.groups = (data.groups || []).map(g => {
        if (typeof g.size === 'number' && (!g.rows || !g.cols)) {
          g.rows = g.size;
          g.cols = g.size;
          delete g.size;
        }
        if (!g.rows) g.rows = 5;
        if (!g.cols) g.cols = 5;
        const total = g.rows * g.cols;
        g.tasks = Array.isArray(g.tasks) ? g.tasks.slice(0, total) : [];
        while (g.tasks.length < total) g.tasks.push("");
        g.checks = Array.isArray(g.checks) ? g.checks.slice(0, total) : [];
        while (g.checks.length < total) g.checks.push(false);
        if (!('randomDate' in g)) g.randomDate = null;
        return g;
      });

      if (!data.stats) data.stats = {};
      data.stats.totalChecksEver ??= 0;
      data.stats.bestBingoLines ??= 0;
      data.stats.bestStreak ??= 0;
      data.stats.perfectDays ??= 0;
      data.stats.midnightOwl ??= false;
      data.stats.hasEdited ??= false;
      data.stats.hasShuffled ??= false;
      data.stats.hasReset ??= false;
      data.stats.groupCount ??= data.groups.length || 1;
      data.stats.currentStreak ??= 0;
      data.stats.lastActiveDate ??= null;
      data.stats.perfectDates ??= [];

      data.lastUpdate ??= getTodayKey();
      data.history ??= { date: '无记录', checked: 0, lines: 0 };
      data.unlockedIds ??= [];
      data.tagPool = Array.isArray(data.tagPool) ? data.tagPool : [...MY_TAGS];
      data.activeIdx ??= 0;
      data.exportProfile ??= {
        username: '',
        site: FIXED_SITE_URL,
        note: '增加生活的接触面。'
      };

      if (!data.groups.length) data.groups = [createGroup('日常丰荣')];
      if (data.activeIdx >= data.groups.length) data.activeIdx = 0;

      return data;
    }

    function loadData() {
      const saved = localStorage.getItem('bingo_v5_final');
      let data;
      if (saved) {
        data = JSON.parse(saved);
      } else {
        data = {
          activeIdx: 0,
          tagPool: [...MY_TAGS],
          groups: [createGroup('日常丰荣')],
          stats: {
            totalChecksEver: 0,
            bestBingoLines: 0,
            bestStreak: 0,
            perfectDays: 0,
            midnightOwl: false,
            hasEdited: false,
            hasShuffled: false,
            hasReset: false,
            groupCount: 1,
            currentStreak: 0,
            lastActiveDate: null,
            perfectDates: []
          },
          lastUpdate: getTodayKey(),
          history: { date: '无记录', checked: 0, lines: 0 },
          unlockedIds: [],
          exportProfile: {
            username: '',
            site: FIXED_SITE_URL,
            note: '增加生活的接触面。'
          }
        };
      }
      return migrateData(data);
    }

    function save() {
      localStorage.setItem('bingo_v5_final', JSON.stringify(appData));
    }

    function cur() {
      return appData.groups[appData.activeIdx];
    }

    function totalCells(group = cur()) {
      return group.rows * group.cols;
    }

    function getCurrentSizeKey(group = cur()) {
      return `${group.rows}x${group.cols}`;
    }

    function dayDiff(dateA, dateB) {
      const a = new Date(dateA + 'T00:00:00');
      const b = new Date(dateB + 'T00:00:00');
      return Math.round((b - a) / 86400000);
    }

    function checkDateRollover() {
      const today = getTodayKey();
      if (appData.lastUpdate === today) return;

      const lastGroup = cur();
      const lines = getWinningLines(lastGroup.checks, lastGroup.rows, lastGroup.cols).length;
      const checked = lastGroup.checks.filter(Boolean).length;

      appData.history = {
        date: appData.lastUpdate || '无记录',
        checked,
        lines
      };

      const lastActive = appData.stats.lastActiveDate;
      if (lastActive && checked > 0) {
        const diff = dayDiff(lastActive, today);
        if (diff === 1) {
          appData.stats.currentStreak += 1;
        } else if (diff > 1) {
          appData.stats.currentStreak = 1;
        }
        appData.stats.bestStreak = Math.max(appData.stats.bestStreak, appData.stats.currentStreak);
      } else if (checked === 0 && appData.stats.currentStreak > 0) {
        const diff = lastActive ? dayDiff(lastActive, today) : 999;
        if (diff > 1) appData.stats.currentStreak = 0;
      }

      appData.lastUpdate = today;
      save();
    }

    function markTodayActive() {
      const today = getTodayKey();
      const lastActive = appData.stats.lastActiveDate;

      if (lastActive === today) return;

      if (!lastActive) {
        appData.stats.currentStreak = 1;
      } else {
        const diff = dayDiff(lastActive, today);
        if (diff === 1) {
          appData.stats.currentStreak += 1;
        } else if (diff > 1) {
          appData.stats.currentStreak = 1;
        }
      }

      appData.stats.lastActiveDate = today;
      appData.stats.bestStreak = Math.max(appData.stats.bestStreak, appData.stats.currentStreak);
    }

    function updatePerfectDay() {
      const today = getTodayKey();
      const total = totalCells();
      const checked = cur().checks.filter(Boolean).length;
      const perfectDates = new Set(appData.stats.perfectDates || []);

      if (checked === total && total > 0 && !perfectDates.has(today)) {
        perfectDates.add(today);
        appData.stats.perfectDates = [...perfectDates];
        appData.stats.perfectDays = perfectDates.size;
      } else {
        appData.stats.perfectDays = perfectDates.size;
      }
    }

    function playGlassDing() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();
        const now = ctx.currentTime;

        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.22, now + 0.01);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
        master.connect(ctx.destination);

        const freqs = [1046.5, 1567.98, 2093];
        freqs.forEach((freq, idx) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now);

          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.14 / (idx + 1), now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.9 + idx * 0.08);

          osc.connect(gain);
          gain.connect(master);

          osc.start(now + idx * 0.01);
          osc.stop(now + 1.05 + idx * 0.08);
        });
      } catch (e) {
        console.log('玻璃叮咚播放失败', e);
      }
    }

    function playUnlockClick() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();
        const now = ctx.currentTime;

        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(520, now);
        osc1.frequency.exponentialRampToValueAtTime(780, now + 0.06);

        gain1.gain.setValueAtTime(0.0001, now);
        gain1.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
        gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);

        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.12);

        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();

        osc2.type = 'square';
        osc2.frequency.setValueAtTime(980, now + 0.04);

        gain2.gain.setValueAtTime(0.0001, now + 0.04);
        gain2.gain.exponentialRampToValueAtTime(0.07, now + 0.05);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.04);
        osc2.stop(now + 0.11);
      } catch (e) {
        console.log('解锁音播放失败', e);
      }
    }

    function getWinningLines(checks, rows, cols) {
      const lines = [];

      for (let r = 0; r < rows; r++) {
        const row = [];
        for (let c = 0; c < cols; c++) row.push(r * cols + c);
        if (row.every(idx => checks[idx])) lines.push(row);
      }

      for (let c = 0; c < cols; c++) {
        const col = [];
        for (let r = 0; r < rows; r++) col.push(r * cols + c);
        if (col.every(idx => checks[idx])) lines.push(col);
      }

      if (rows === cols) {
        const d1 = [];
        const d2 = [];
        for (let i = 0; i < rows; i++) {
          d1.push(i * cols + i);
          d2.push(i * cols + (cols - 1 - i));
        }
        if (d1.every(idx => checks[idx])) lines.push(d1);
        if (d2.every(idx => checks[idx])) lines.push(d2);
      }

      return lines;
    }

    function updateStatsDisplay(lineCount) {
      const total = totalCells();
      const checked = cur().checks.filter(Boolean).length;

      updatePerfectDay();

      document.getElementById('checkedCount').innerText = checked;
      document.getElementById('bingoCount').innerText = lineCount;
      document.getElementById('streakCount').innerText = appData.stats.currentStreak || 0;
      document.getElementById('perfectDays').innerText = appData.stats.perfectDays || 0;

      document.getElementById('todayBadge').innerText = "今天：" + getDisplayDate(getTodayKey());
      document.getElementById('progressBadge').innerText = `进度：${checked} / ${total}`;
      document.getElementById('lineBadge').innerText = `Bingo：${lineCount} 条`;

      document.getElementById('prevDate').innerText = getDisplayDate(appData.history.date);
      document.getElementById('prevChecked').innerText = appData.history.checked;
      document.getElementById('prevLines').innerText = appData.history.lines;

      appData.stats.bestBingoLines = Math.max(appData.stats.bestBingoLines, lineCount);
      appData.stats.groupCount = appData.groups.length;

      save();
    }

    function refreshAchievements(silent = false) {
      const unlockedNow = ACHIEVEMENTS.filter(a => a.test(appData.stats)).map(a => a.id);
      const previous = new Set(appData.unlockedIds || []);
      const newlyUnlocked = unlockedNow.filter(id => !previous.has(id));
      appData.unlockedIds = unlockedNow;

      const list = document.getElementById('achievementList');
      list.innerHTML = '';

      ACHIEVEMENTS.forEach(a => {
        const unlocked = unlockedNow.includes(a.id);
        const div = document.createElement('div');
        div.className = `achievement ${unlocked ? '' : 'locked'}`;
        div.innerHTML = `<div><strong>${unlocked ? '🏆' : '🔒'} ${a.label}</strong><div class="tiny">${a.desc}</div></div>`;
        list.appendChild(div);
      });

      if (!silent && newlyUnlocked.length) {
        const first = ACHIEVEMENTS.find(a => a.id === newlyUnlocked[0]);
        if (first) {
          showToast(`🏆 成就解锁：${first.label}`);
          playUnlockClick();
          if (navigator.vibrate) navigator.vibrate([40, 50, 40]);
          confetti({ particleCount: 60, spread: 55, origin: { y: 0.7 } });
        }
      }

      save();
    }

    function checkBingoCelebration(oldLen) {
      const newLen = getWinningLines(cur().checks, cur().rows, cur().cols).length;
      if (newLen > oldLen) {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        showToast(`🎉 Bingo +${newLen - oldLen}`);
        playGlassDing();
        if (navigator.vibrate) navigator.vibrate(50);
      }
    }

    function showToast(m) {
      const t = document.getElementById('toast');
      t.innerText = m;
      t.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, s => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[s]));
    }

    function fillExportInputs() {
      const profile = appData.exportProfile || {};
      document.getElementById('exportUsername').value = profile.username || '';
      document.getElementById('exportNote').value = profile.note || '增加生活的接触面。';
    }

    function saveExportProfileFromInputs() {
      appData.exportProfile = {
        username: document.getElementById('exportUsername').value.trim(),
        site: FIXED_SITE_URL,
        note: document.getElementById('exportNote').value.trim() || '增加生活的接触面。'
      };
      save();
    }

    function buildExportCard() {
      saveExportProfileFromInputs();

      const card = document.getElementById('exportCard');
      const username = appData.exportProfile.username || '未命名用户';
      const note = appData.exportProfile.note || '增加生活的接触面。';

      const checked = cur().checks.filter(Boolean).length;
      const total = totalCells();
      const lineCount = getWinningLines(cur().checks, cur().rows, cur().cols).length;
      const streak = appData.stats.currentStreak || 0;
      const perfectDays = appData.stats.perfectDays || 0;
      const dateText = getDisplayDate(getTodayKey());
      const groupName = cur().name || '我的清单';
      const hitSet = new Set(getWinningLines(cur().checks, cur().rows, cur().cols).flat());

      const gridHtml = cur().tasks.map((text, i) => {
        const cls = [
          'export-cell',
          cur().checks[i] ? 'checked' : '',
          hitSet.has(i) ? 'hit' : ''
        ].filter(Boolean).join(' ');
        return `<div class="${cls}">${escapeHtml(text || '—')}</div>`;
      }).join('');

      card.innerHTML = `
        <div class="export-head">
          <div>
            <h3 class="export-title">🌿 人类丰荣 Bingo</h3>
            <div class="export-sub">${escapeHtml(username)} · ${escapeHtml(dateText)}</div>
          </div>
          <div class="export-pill">${escapeHtml(groupName)}</div>
        </div>

        <div class="export-meta">
          <div class="export-pill">完成 ${checked} / ${total}</div>
          <div class="export-pill">Bingo ${lineCount} 条</div>
          <div class="export-pill">连续 ${streak} 天</div>
          <div class="export-pill">完美 ${perfectDays} 天</div>
        </div>

        <div class="export-grid" style="grid-template-columns: repeat(${cur().cols}, 1fr);">
          ${gridHtml}
        </div>

        <div class="export-footer">
          <div class="export-copy">${escapeHtml(note)}</div>
          <div class="export-site">${escapeHtml(FIXED_SITE_URL)}</div>
        </div>
      `;
    }

    function openExportModal() {
      fillExportInputs();
      document.getElementById('exportModal').classList.add('open');
      buildExportCard();
    }

async function downloadExportCard() {

    function renderSizePicker() {
      const wrap = document.getElementById('sizePicker');
      wrap.innerHTML = '';
      const currentKey = getCurrentSizeKey();

      SIZE_OPTIONS.forEach(opt => {
        const btn = document.createElement('div');
        btn.className = `size-chip ${currentKey === opt.key ? 'active' : ''}`;
        btn.textContent = opt.key;
        btn.onclick = () => applySize(opt.rows, opt.cols);
        wrap.appendChild(btn);
      });
    }

    function applySize(rows, cols) {
      if (cur().rows === rows && cur().cols === cols) return;
      const total = rows * cols;
      cur().rows = rows;
      cur().cols = cols;
      cur().tasks = Array(total).fill("");
      cur().checks = Array(total).fill(false);
      cur().randomDate = null;
      save();
      draw();
      showToast(`已切换为 ${rows}×${cols}`);
    }

    function renderTagPool() {
      const container = document.getElementById('tagPool');
      container.innerHTML = '';
      appData.tagPool.forEach(tag => {
        const el = document.createElement('div');
        el.className = 'tag-item';
        el.draggable = true;
        el.innerHTML = `<span>${tag}</span><span class="del" title="从池中永久删除">×</span>`;

        el.onclick = (e) => {
          if (e.target.className === 'del') {
            removeTag(tag);
            return;
          }
          fillTagToGrid(tag);
        };

        el.ondragstart = (e) => {
          if (e.target.className === 'del') return;
          dragState = { type: 'tag', value: tag };
          el.classList.add('dragging');
          e.dataTransfer.setData('text/plain', JSON.stringify(dragState));
        };

        el.ondragend = () => {
          dragState = { type: null, value: null };
          el.classList.remove('dragging');
          document.querySelectorAll('.item.drag-over').forEach(n => n.classList.remove('drag-over'));
        };

        container.appendChild(el);
      });
    }

    function fillTagToGrid(tag) {
      const emptyIdx = cur().tasks.findIndex(t => t === "" || t === null);
      if (emptyIdx === -1) {
        showToast("格子已满！右键格子可清空内容");
        return;
      }
      cur().tasks[emptyIdx] = tag;
      cur().checks[emptyIdx] = false;
      appData.stats.hasEdited = true;
      save();
      draw();
    }

    function addTagFromInput() {
      const input = document.getElementById('tagInput');
      const val = input.value.trim();
      if (val && !appData.tagPool.includes(val)) {
        appData.tagPool.push(val);
        input.value = '';
        save();
        renderTagPool();
      }
    }

    function removeTag(tag) {
      if (confirm(`从任务池永久删除 "${tag}" 吗？`)) {
        appData.tagPool = appData.tagPool.filter(t => t !== tag);
        save();
        renderTagPool();
      }
    }

    function randomChallenge() {
      const total = totalCells();
      if (appData.tagPool.length < total) {
        alert("池里任务太少啦，多加几个再随机吧！");
        return;
      }

      const today = getTodayKey();
      if (cur().randomDate === today) {
        showToast("今天已经随机过啦");
        return;
      }

      let shuffled = [...appData.tagPool].sort(() => 0.5 - Math.random());
      cur().tasks = shuffled.slice(0, total);
      cur().checks = Array(total).fill(false);
      cur().randomDate = today;
      appData.stats.hasShuffled = true;
      save();
      draw();
      confetti({ particleCount: 100, spread: 70 });
    }

    function addGroup() {
      const name = prompt("输入新分组名称", "清单" + (appData.groups.length + 1));
      if (!name) return;
      appData.groups.push(createGroup(name));
      appData.activeIdx = appData.groups.length - 1;
      save();
      draw();
    }

    function renameGroup() {
      const name = prompt("修改名称", cur().name);
      if (name) {
        cur().name = name;
        save();
        draw();
      }
    }

    function deleteGroup() {
      if (appData.groups.length <= 1) return alert("至少保留一个分组");
      if (confirm("确定删除整个分组吗？")) {
        appData.groups.splice(appData.activeIdx, 1);
        appData.activeIdx = 0;
        save();
        draw();
      }
    }

    function draw() {
      checkDateRollover();

      const tabWrap = document.getElementById('folderTabs');
      tabWrap.innerHTML = '';
      appData.groups.forEach((g, i) => {
        const btn = document.createElement('div');
        btn.className = `tab ${i === appData.activeIdx ? 'active' : ''}`;
        btn.innerText = g.name;
        btn.onclick = () => { appData.activeIdx = i; draw(); };
        tabWrap.appendChild(btn);
      });

      const addBtn = document.createElement('div');
      addBtn.className = 'tab tab-add';
      addBtn.innerText = '+ 新分组';
      addBtn.onclick = addGroup;
      tabWrap.appendChild(addBtn);

      renderSizePicker();

      const grid = document.getElementById('bingoGrid');
      grid.style.gridTemplateColumns = `repeat(${cur().cols}, 1fr)`;
      grid.innerHTML = '';

      const lines = getWinningLines(cur().checks, cur().rows, cur().cols);
      const hitSet = new Set(lines.flat());

      cur().tasks.forEach((text, i) => {
        const el = document.createElement('div');
        el.className = `item ${cur().checks[i] ? 'checked' : ''} ${hitSet.has(i) ? 'bingo-hit' : ''}`;
        el.textContent = text || "";

        el.onclick = () => {
          if (!cur().tasks[i]) {
            showToast("请先从任务池拖一个任务过来");
            return;
          }
          const wasChecked = cur().checks[i];
          cur().checks[i] = !cur().checks[i];
          if (!wasChecked && cur().checks[i]) {
            appData.stats.totalChecksEver++;
            if (new Date().getHours() < 5) appData.stats.midnightOwl = true;
            markTodayActive();
          }
          const oldLen = lines.length;
          updatePerfectDay();
          checkBingoCelebration(oldLen);
          save();
          draw();
        };

        el.oncontextmenu = (e) => {
          e.preventDefault();
          cur().tasks[i] = "";
          cur().checks[i] = false;
          save();
          draw();
        };

        el.draggable = !!cur().tasks[i];
        el.ondragstart = (e) => {
          if (!cur().tasks[i]) return;
          dragState = { type: 'grid', value: i };
          e.dataTransfer.setData('text/plain', JSON.stringify(dragState));
        };
        el.ondragend = () => {
          dragState = { type: null, value: null };
          document.querySelectorAll('.item.drag-over').forEach(n => n.classList.remove('drag-over'));
          document.querySelectorAll('.tag-item.dragging').forEach(n => n.classList.remove('dragging'));
        };
        el.ondragover = (e) => {
          e.preventDefault();
          el.classList.add('drag-over');
        };
        el.ondragleave = () => {
          el.classList.remove('drag-over');
        };
        el.ondrop = (e) => {
          e.preventDefault();
          el.classList.remove('drag-over');

          let payload = dragState;
          try {
            const raw = e.dataTransfer.getData('text/plain');
            if (raw) payload = JSON.parse(raw);
          } catch (_) {}

          if (!payload || !payload.type) return;

          if (payload.type === 'grid') {
            const from = Number(payload.value);
            const to = i;
            if (Number.isNaN(from) || from === to) return;

            [cur().tasks[from], cur().tasks[to]] = [cur().tasks[to], cur().tasks[from]];
            [cur().checks[from], cur().checks[to]] = [cur().checks[to], cur().checks[from]];
            appData.stats.hasEdited = true;
            save();
            draw();
          }

          if (payload.type === 'tag') {
            cur().tasks[i] = payload.value;
            cur().checks[i] = false;
            appData.stats.hasEdited = true;
            save();
            draw();
          }

          dragState = { type: null, value: null };
        };

        grid.appendChild(el);
      });

      renderTagPool();
      updateStatsDisplay(lines.length);
      refreshAchievements(true);
    }

    document.getElementById('tagInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    addTagFromInput();
  }
});

    document.getElementById('editAllBtn').onclick = () => {
      document.getElementById('editorArea').value = cur().tasks.join('\n');
      document.getElementById('editorModal').classList.add('open');
    };

    document.getElementById('saveEditorBtn').onclick = () => {
      const lines = document.getElementById('editorArea').value.split('\n');
      const total = totalCells();
      cur().tasks = lines.slice(0, total);
      while (cur().tasks.length < total) cur().tasks.push("");
      cur().checks = cur().checks.slice(0, total);
      while (cur().checks.length < total) cur().checks.push(false);
      appData.stats.hasEdited = true;
      save();
      draw();
      refreshAchievements(false);
      document.getElementById('editorModal').classList.remove('open');
    };

    document.getElementById('closeEditorBtn').onclick = () => {
      document.getElementById('editorModal').classList.remove('open');
    };

    document.getElementById('resetChecksBtn').onclick = () => {
      if (confirm("要重置当前分组的打卡进度吗（任务文字会保留）？")) {
        cur().checks.fill(false);
        appData.stats.hasReset = true;
        save();
        draw();
        refreshAchievements(false);
      }
    };

    document.getElementById('openExportBtn').onclick = openExportModal;
    document.getElementById('closeExportBtn').onclick = () => {
      document.getElementById('exportModal').classList.remove('open');
    };
    document.getElementById('downloadExportBtn').onclick = downloadExportCard;

    document.getElementById('exportUsername').addEventListener('input', buildExportCard);
document.getElementById('exportNote').addEventListener('input', buildExportCard);

const noticeBoard = document.getElementById('noticeBoard');
const noticeToggle = document.getElementById('noticeToggle');

if (noticeBoard && noticeToggle) {
  noticeToggle.addEventListener('click', () => {
    const collapsed = noticeBoard.classList.toggle('collapsed');
    noticeToggle.setAttribute('aria-expanded', String(!collapsed));
  });
}

draw();
  </script>
</body>
</html>
